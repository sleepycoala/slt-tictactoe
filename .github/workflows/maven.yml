name: Java CI/CD with Maven

# Define what events trigger this pipeline
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Compile the code and run automated unit tests
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven' # Caches dependencies to make future builds faster
        
    - name: Run Maven Tests
      run: mvn clean test

  # JOB 2: Package the app and make the JAR downloadable (Only runs on Main branch push)
  deploy-artifact:
    needs: build-and-test # This job only runs if the tests pass successfully
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Package JAR
      run: mvn clean package -DskipTests
      
    - name: Upload JAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tictactoe-game-jar
        path: target/*.jar